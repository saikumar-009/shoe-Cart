<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe-Cart</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="root">
        <div class="product">
            <div class="left" >
                <img class="shoe" src="/images/shoe.png" alt="">
            </div>
            <div class="right">
                <span class="logo">Airmax</span>
                <div class="content"> 
                    <div class="wm">
                        <span class="winter">Winter Collection</span><br />
                        <span class="men">Men Black Sneakers</span>
                    </div>
                    <div class="price">
                        <span class="price1">150</span>
                        <span class="price2">200</span>
                    </div>
                    <div class="size">
                        <span class="s">SIZE</span>
                        <div class="size-num">
                            <span>7</span>
                            <span>8</span>
                            <span>9</span>
                            <span>10</span>
                            <span>11</span>
                        </div>
                    </div>
                    <div class="color">
                        <span class="s">COLOR</span>
                        <div class="color-box">
                        <div class="yellow"></div>
                        <div class="white"></div>
                        <div class="blue"></div>
                    </div>
                    </div>
                    <div class="footer">
                        <span>Buy Now</span>
                        <span>Add To Cart</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
